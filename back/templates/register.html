<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Resilio | Registro</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script>
        // Aplicar tema antes de cargar
        (function() {
            const savedTheme = localStorage.getItem('resilio-theme') || 'dark';
            document.documentElement.setAttribute('data-theme', savedTheme);
        })();
    </script>
</head>

<body class="auth-page">
    <div class="login-wrapper">
        <div class="register-card">
            <header class="logo-container">
                <img src="{{ url_for('static', filename='img/resilio-logo-sinfondo.png') }}" alt="Resilio Logo"
                    class="main-logo">
                <p class="tagline" data-i18n="tagline">Únete a Resilio y mide tu bienestar mental</p>
            </header>

            {% with messages = get_flashed_messages(with_categories=true) %}
            {% if messages %}
            {% for category, message in messages %}
            <div class="alert alert-{{ category }}">{{ message }}</div>
            {% endfor %}
            {% endif %}
            {% endwith %}

            <form action="/register" method="POST" class="login-form">
                <div class="input-field">
                    <label data-i18n="nombre">Nombre</label>
                    <div class="input-icon-wrapper">
                        <i class="fas fa-user"></i>
                        <input type="text" name="nombre" placeholder="Ej. Piero" required>
                    </div>
                </div>

                <div class="input-field">
                    <label data-i18n="apellidos">Apellidos</label>
                    <div class="input-icon-wrapper">
                        <i class="fas fa-users"></i>
                        <input type="text" name="apellidos" placeholder="Ej. Funes Larios">
                    </div>
                </div>

                <div class="input-field">
                    <label data-i18n="email">Email</label>
                    <div class="input-icon-wrapper">
                        <i class="fas fa-at"></i>
                        <input type="email" name="email" placeholder="usuario@resilio.com" required>
                    </div>
                </div>

                <div class="input-field">
                    <label data-i18n="contrasena">Contraseña</label>
                    <div class="input-icon-wrapper">
                        <i class="fas fa-lock"></i>
                        <input type="password" name="password" placeholder="Mínimo 8 caracteres" required minlength="8">
                    </div>
                </div>
                <div class="input-field">
                    <label data-i18n="codigoEmpresa">Código de Empresa (Opcional)</label>
                    <div class="input-icon-wrapper">
                        <i class="fas fa-building"></i>
                        <input type="text" name="codigo_empresa" placeholder="Ej. ACME-HR-2026">
                    </div>
                    <small style="color: var(--text-secondary); font-size: 0.75rem; display: block; margin-top: 6px;" data-i18n="codigoAyuda">Déjalo en blanco si eres usuario personal</small>
                </div>

                <button type="submit" class="btn-primary" data-i18n="crearCuenta">Crear Cuenta</button>

                <div class="form-footer">
                    <a href="/login" data-i18n="yaTienesCuenta">¿Ya tienes cuenta? Inicia sesión aquí</a>
                </div>
            </form>
        </div>
    </div>

    <script>
        // Sistema de traducciones
        const translations = {
            es: {
                tagline: "Únete a Resilio y mide tu bienestar mental",
                nombre: "Nombre",
                apellidos: "Apellidos",
                email: "Email",
                contrasena: "Contraseña",
                codigoEmpresa: "Código de Empresa (Opcional)",
                codigoAyuda: "Déjalo en blanco si eres usuario personal",
                crearCuenta: "Crear Cuenta",
                yaTienesCuenta: "¿Ya tienes cuenta? Inicia sesión aquí"
            },
            en: {
                tagline: "Join Resilio and measure your mental wellbeing",
                nombre: "Name",
                apellidos: "Surname",
                email: "Email",
                contrasena: "Password",
                codigoEmpresa: "Company Code (Optional)",
                codigoAyuda: "Leave blank if you are a personal user",
                crearCuenta: "Create Account",
                yaTienesCuenta: "Already have an account? Sign in here"
            },
            ca: {
                tagline: "Uneix-te a Resilio i mesura el teu benestar mental",
                nombre: "Nom",
                apellidos: "Cognoms",
                email: "Email",
                contrasena: "Contrasenya",
                codigoEmpresa: "Codi d'Empresa (Opcional)",
                codigoAyuda: "Deixa-ho en blanc si ets usuari personal",
                crearCuenta: "Crear Comptee",
                yaTienesCuenta: "Ja tens compte? Inicia sessió aquí"
            }
        };
        
        function setLanguage(lang) {
            localStorage.setItem('resilio-language', lang);
            applyTranslations(lang);
        }
        
        function applyTranslations(lang) {
            const elements = document.querySelectorAll('[data-i18n]');
            elements.forEach(el => {
                const key = el.getAttribute('data-i18n');
                if (translations[lang] && translations[lang][key]) {
                    el.textContent = translations[lang][key];
                }
            });
            document.documentElement.lang = lang;
        }
        
        document.addEventListener('DOMContentLoaded', function() {
            const savedLang = localStorage.getItem('resilio-language') || 'es';
            applyTranslations(savedLang);
        });
    </script>
</body>

</html>
