<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Resilio | Login</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>

<body class="resilio-dark-theme">
    <div class="login-wrapper">
        <div class="login-card">
            <header class="logo-container">
                <img src="{{ url_for('static', filename='img/resilio-logo-sinfondo.png') }}" alt="Resilio Logo"
                    class="main-logo">
                <p class="tagline">Equilibrio entre mente y código</p>
            </header>

            {% with messages = get_flashed_messages(with_categories=true) %}
            {% if messages %}
            {% for category, message in messages %}
            <div class="alert alert-{{ category }}">{{ message }}</div>
            {% endfor %}
            {% endif %}
            {% endwith %}

            <form action="/login" method="POST" class="login-form">
                <div class="input-field">
                    <label>Email Corporativo o Personal</label>
                    <div class="input-icon-wrapper">
                        <i class="fas fa-at"></i>
                        <input type="email" name="email" placeholder="usuario@resilio.com" required>
                    </div>
                </div>

                <div class="input-field">
                    <label>Contraseña</label>
                    <div class="input-icon-wrapper">
                        <i class="fas fa-fingerprint"></i>
                        <input type="password" name="password" placeholder="••••••••" required>
                    </div>
                </div>

                <button type="submit" class="btn-primary">Iniciar Sesión</button>

                <div class="form-footer">
                    <a href="/register">¿Aún no tienes cuenta? Regístrate</a>
                    <a href="#" class="help-link">¿Olvidaste tu contraseña?</a>
                </div>
            </form>
        </div>
    </div>
</body>

</html>
