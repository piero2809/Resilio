<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Resilio | Login</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script>
        // Aplicar tema antes de cargar
        (function() {
            const savedTheme = localStorage.getItem('resilio-theme') || 'dark';
            document.documentElement.setAttribute('data-theme', savedTheme);
        })();
    </script>
</head>

<body class="auth-page">
    <div class="login-wrapper">
        <div class="login-card">
            <header class="logo-container">
                <img src="{{ url_for('static', filename='img/resilio-logo-sinfondo.png') }}" 
                     alt="Resilio Logo"
                     class="main-logo">
                <p class="tagline" data-i18n="tagline">Equilibrio entre mente y código</p>
            </header>

            {% with messages = get_flashed_messages(with_categories=true) %}
                {% if messages %}
                    {% for category, message in messages %}
                        <div class="alert alert-{{ category }}">{{ message }}</div>
                    {% endfor %}
                {% endif %}
            {% endwith %}

            <form action="/login" method="POST" class="login-form">
                <div class="input-field">
                    <label data-i18n="emailLabel">Email Corporativo o Personal</label>
                    <div class="input-icon-wrapper">
                        <i class="fas fa-at"></i>
                        <input type="email" name="email" placeholder="usuario@resilio.com" required>
                    </div>
                </div>

                <div class="input-field">
                    <label data-i18n="passwordLabel">Contraseña</label>
                    <div class="input-icon-wrapper">
                        <i class="fas fa-fingerprint"></i>
                        <input type="password" name="password" placeholder="••••••••" required>
                    </div>
                </div>

                <div class="remember-forgot">
                    <label class="checkbox-wrapper">
                        <input type="checkbox" name="remember">
                        <span class="checkmark"></span>
                        <span data-i18n="recordarme">Recordarme</span>
                    </label>
                    <a href="#" class="help-link" data-i18n="olvidasteContrasena">¿Olvidaste tu contraseña?</a>
                </div>

                <button type="submit" class="btn-primary" data-i18n="iniciarSesion">Iniciar Sesión</button>

                <div class="form-footer">
                    <p><span data-i18n="noTienesCuenta">¿Aún no tienes cuenta?</span> <a href="/register" class="register-link" data-i18n="registrate">Regístrate</a></p>
                </div>
            </form>
        </div>
    </div>

    <script>
        // Sistema de traducciones
        const translations = {
            es: {
                tagline: "Equilibrio entre mente y código",
                emailLabel: "Email Corporativo o Personal",
                passwordLabel: "Contraseña",
                recordarme: "Recordarme",
                olvidasteContrasena: "¿Olvidaste tu contraseña?",
                iniciarSesion: "Iniciar Sesión",
                noTienesCuenta: "¿Aún no tienes cuenta?",
                registrate: "Regístrate"
            },
            en: {
                tagline: "Balance between mind and code",
                emailLabel: "Corporate or Personal Email",
                passwordLabel: "Password",
                recordarme: "Remember me",
                olvidasteContrasena: "Forgot your password?",
                iniciarSesion: "Sign In",
                noTienesCuenta: "Don't have an account?",
                registrate: "Sign up"
            },
            ca: {
                tagline: "Equilibri entre ment i codi",
                emailLabel: "Email Corporatiu o Personal",
                passwordLabel: "Contrasenya",
                recordarme: "Recorda'm",
                olvidasteContrasena: "Has oblidat la contrasenya?",
                iniciarSesion: "Iniciar Sessió",
                noTienesCuenta: "Encara no tens compte?",
                registrate: "Registra't"
            }
        };
        
        function setLanguage(lang) {
            localStorage.setItem('resilio-language', lang);
            applyTranslations(lang);
        }
        
        function applyTranslations(lang) {
            const elements = document.querySelectorAll('[data-i18n]');
            elements.forEach(el => {
                const key = el.getAttribute('data-i18n');
                if (translations[lang] && translations[lang][key]) {
                    el.textContent = translations[lang][key];
                }
            });
            document.documentElement.lang = lang;
        }
        
        document.addEventListener('DOMContentLoaded', function() {
            const savedLang = localStorage.getItem('resilio-language') || 'es';
            applyTranslations(savedLang);
        });
    </script>
</body>

</html>
